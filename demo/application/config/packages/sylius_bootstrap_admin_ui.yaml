imports:
    - { resource: '@SyliusBootstrapAdminUiBundle/config/app.php' }

sylius_twig_hooks:
    hooks:
        'sylius_admin.base#javascripts':
            folder_tree:
                template: 'shared/assets/javascripts/folder_tree.html.twig'

        'jolicode_sylius_admin.media.index':
            title:
                template: '@SyliusBootstrapAdminUi/shared/crud/common/content/header/title_block/title.html.twig'
                configuration:
                    title: Media

        'jolicode_sylius_admin.media.index.content':
            grid:
                enabled: false
            body:
                template: 'media/index/content/body.html.twig'

        'jolicode_sylius_admin.media.index.content.header':
            breadcrumbs:
                template: '@SyliusBootstrapAdminUi/shared/crud/index/content/header/breadcrumbs.html.twig'
                configuration:
                    title: 'Media'

        'jolicode_sylius_admin.media.index.content.header.title_block':
            title:
                template: '@SyliusBootstrapAdminUi/shared/crud/common/content/header/title_block/title.html.twig'
                configuration:
                    title: Media
#            actions:
#                enabled: false

        'jolicode_sylius_admin.media.index.content.body':
            tree:
                template: 'media/index/content/body/tree.html.twig'
            tabs:
                template: 'media/index/content/body/tabs.html.twig'

        'jolicode_sylius_admin.media.index.content.body.tabs.header':
            list_view:
                template: 'media/index/content/body/tabs/header/list_view.html.twig'
            grid_view:
                template: 'media/index/content/body/tabs/header/grid_view.html.twig'

        'jolicode_sylius_admin.media.index.content.body.tabs.content':
            list_view:
                template: 'media/index/content/body/tabs/content/list_view.html.twig'
            grid_view:
                template: 'media/index/content/body/tabs/content/grid_view.html.twig'


        'jolicode_sylius_admin.media.index.content.body.tabs.content.list_view':
            grid:
                template: '@SyliusBootstrapAdminUi/shared/crud/index/content/grid.html.twig'

        'jolicode_sylius_admin.media.index.content.body.tabs.content.list_view.grid':
            data_table:
                template: '@SyliusBootstrapAdminUi/shared/crud/index/content/grid/data_table.html.twig'
